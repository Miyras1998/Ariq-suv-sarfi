<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ariq suv sarfi</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9129324168081991" crossorigin="anonymous"></script>

    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #f4f7fb; padding-bottom: 20px; }
        .header { background: #1976d2; padding: 15px; text-align: center; }
        .header nav { display: flex; justify-content: center; gap: 20px; }
        .header a { color: white; text-decoration: none; font-weight: bold; }
        
        .container { max-width: 800px; margin: 20px auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1e7f43; }
        
        .content { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
        .image-box, .form-box { flex: 1; min-width: 280px; }
        .image-box img { width: 100%; border-radius: 8px; }
        
        label { display: block; margin-top: 10px; font-weight: bold; }
        input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        
        button { width: 100%; padding: 12px; background: #1e7f43; color: white; border: none; border-radius: 8px; margin-top: 20px; cursor: pointer; font-size: 16px; }
        button:hover { background: #166334; }
        
        .result { margin-top: 20px; padding: 15px; background: #eefaf3; border-radius: 8px; border-left: 5px solid #1e7f43; display: none; }
        .formula { background: #f9f9f9; padding: 10px; border-left: 4px solid #1976d2; margin: 15px 0; font-family: "Courier New", Courier, monospace; font-weight: bold; }
    </style>
</head>
<body>

<header class="header">
    <nav>
        <a href="#">🏠 Asosiy</a>
        <a href="#">ℹ️ Ma'lumot</a>
    </nav>
</header>

<div class="container">
    <h2>💧 Ariq suv sarfini hisoblash</h2>

    <div class="content">
        <div class="image-box">
            <img src="https://via.placeholder.com/400x300.png?text=Ariq+Chizmasi" alt="Ariq chizmasi">
        </div>

        <div class="form-box">
            <label for="width">Ariq kengligi (m):</label>
            <input type="number" id="width" step="0.01" placeholder="Masalan: 0.6">

            <label for="depth">Suv balandligi (m):</label>
            <input type="number" id="depth" step="0.01" placeholder="Masalan: 0.4">

            <label for="speed">Oqim tezligi (m/sek):</label>
            <input type="number" id="speed" step="0.01" placeholder="Masalan: 0.8">

            <button onclick="calculate()">Hisoblash</button>

            <div id="resultBox" class="result">
                <strong>Natija:</strong> <span id="resVal">0</span> m³/sek
            </div>
        </div>
    </div>

    <hr>
    <h3>Hisoblash formulasi:</h3>
    <div class="formula">Q = S × v</div>
    <p>Bunda:</p>
    <ul>
        <li><b>Q</b> — suv sarfi (m³/sek)</li>
        <li><b>S</b> — kesim yuzasi (kenglik × balandlik)</li>
        <li><b>v</b> — oqim tezligi</li>
    </ul>
</div>

<script>
    function calculate() {
        const w = document.getElementById('width').value;
        const d = document.getElementById('depth').value;
        const s = document.getElementById('speed').value;
        const resBox = document.getElementById('resultBox');
        const resVal = document.getElementById('resVal');

        if (w > 0 && d > 0 && s > 0) {
            const Q = (w * d * s).toFixed(3);
            resVal.innerText = Q;
            resBox.style.display = 'block';
        } else {
            alert("Iltimos, barcha maydonlarni to'g'ri to'ldiring!");
        }
    }
</script>

</body>
</html>
