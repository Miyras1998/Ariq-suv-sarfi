<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f3f7f6;
}

header{
background:#0a7cff;
color:white;
text-align:center;

}

.container{
max-width:800px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

h1{
font-size:22px;

color:#1e7f43;
}

.note{
font-size:13px;
color:#666;
text-align:center;
margin-bottom:20px;
}

label{
display:block;
margin-top:12px;

}

input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
margin-top:5px;
font-size:16px;
}

button{
width:100%;
padding:12px;
margin-top:16px;
background:#1e7f43;
color:white;
border:none;
border-radius:10px;
font-size:17px;
cursor:pointer;
}

button:hover{
background:#166334;
}

.result{
margin-top:15px;
padding:12px;
background:#eefaf3;
border-radius:8px;

<body>

<header>
💧 Ariq suv sarfi kalkulyatori
</header>

<div class="container">

<div class="card">

<h1>Ariqdan o‘tayotgan suv miqdorini hisoblash</h1>

<p class="note">
Eslatma: Hisob-kitob natijalari taxminiy bo‘lib, ariq shakli va oqim tezligiga qarab farq qilishi mumkin.
</p>

<label>Yuqori kenglik (metr)</label>
<input type="number" id="topWidth" placeholder="masalan 2">

<label>Pastki kenglik (metr)</label>
<input type="number" id="bottomWidth" placeholder="masalan 1">

<label>Suv chuqurligi (metr)</label>
<input type="number" id="depth" placeholder="masalan 0.5">

<label>Suv oqim tezligi (m/s)</label>
<input type="number" id="speed" placeholder="masalan 1">

<button onclick="hisobla()">Hisoblash</button>

<div class="result" id="result"></div>

</div>

</div>

<footer>
© 2026 Ariq suv kalkulyatori
</footer>

<script>

function hisobla(){

let a = parseFloat(document.getElementById("topWidth").value);
let b = parseFloat(document.getElementById("bottomWidth").value);
let h = parseFloat(document.getElementById("depth").value);
let v = parseFloat(document.getElementById("speed").value);

if(!a || !b || !h || !v){
document.getElementById("result").innerHTML="Iltimos barcha maydonlarni to‘ldiring";
return;
}

let S = (a + b) / 2 * h;

let Q = S * v;

document.getElementById("result").innerHTML =
"Suv sarfi: " + Q.toFixed(3) + " m³/s";

}

</script>

</body>
